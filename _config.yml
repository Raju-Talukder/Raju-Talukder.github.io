# Reading Files
include:
  - ".htaccess"
  - "_pages"

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - "vendor"
  - ".asset-cache"
  - ".bundle"
  - ".jekyll-assets-cache"
  - ".sass-cache"
  - "assets/js/plugins"
  - "assets/js/_main.js"
  - "assets/js/vendor"
  - "Capfile"
  - "CHANGELOG"
  - "config"
  - "Gemfile"
  - "Gruntfile.js"
  - "gulpfile.js"
  - "LICENSE"
  - "log"
  - "minimal-mistakes-jekyll.gemspec"
  - "node_modules"
  - "package.json"
  - "package-lock.json"
  - "Rakefile"
  - "README"
  - "tmp"
  - "/docs"
  - "/test"

keep_files:
  - ".git"
  - ".svn"

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: "kramdown"
highlighter: "rouge"
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: "GFM"
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: "as_char"
  toc_levels: "1..6"
  smart_quotes: "lsquo,rsquo,ldquo,rdquo"
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: "_sass"
  style: "compressed"

# Outputting
permalink: "/:categories/:title/"
timezone:

# Pagination
paginate: 5
paginate_path: "/page:num/"

pagination:
  debug: false
  collection: "posts"
  per_page: 10
  permalink: "/page/:num/"
  title: ":title - page :num"
  limit: 0
  sort_field: "date"
  sort_reverse: true
  category: "posts"
  tag: ""
  locale: ""
  trail:
    before: 2
    after: 2

# Plugins
plugins:
  - "jekyll-paginate"
  - "jekyll-sitemap"
  - "jekyll-gist"
  - "jekyll-feed"
  - "jekyll-include-cache"

# GitHub Pages safe-mode whitelist
whitelist:
  - "jekyll-paginate"
  - "jekyll-sitemap"
  - "jekyll-gist"
  - "jekyll-feed"
  - "jekyll-include-cache"

# Archives
category_archive:
  type: "liquid"
  path: "/categories/"

tag_archive:
  type: "liquid"
  path: "/tags/"

# HTML Compression
compress_html:
  clippings: "all"
  ignore:
    envs: ["development"]

# Defaults (merged into ONE block)
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "single"
