# Welcome to Jekyll!
# Minimal Mistakes + GitHub Pages configuration

# Theme Settings
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "dark" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Site Settings
locale: "en-US"
title: "Raju Talukder"
title_separator: "|"
name: "Raju Talukder"
description: "Just another boring Cyber Security Researcher | Red Teamer"

# IMPORTANT: must be set correctly for OG/canonical links
url: "https://raju-talukder.github.io"
baseurl: ""  # keep empty for username.github.io sites

# Optional
repository: "Raju-Talukder/raju-talukder.github.io"
words_per_minute: 200
breadcrumbs: false
enable_copy_code_button: true

# Open Graph/Twitter default site image (LinkedIn preview fallback)
# NOTE: You can override per-page using front matter: `image: /assets/images/xxx.png`
og_image: "/assets/images/og-card.png"

# Comments (Giscus)
comments:
  provider: "giscus"
  giscus:
    repo_id: "R_kgDOOk683w"
    category_name: "General"
    category_id: "DIC_kwDOOk68384Cp0m5"
    discussion_term: "url"
    reactions_enabled: "1"
    theme: "dark"
    strict: 0
    input_position: "top"
    emit_metadata: 0
    lang: "en"
    lazy: true

# Feed
atom_feed:
  hide: true

# Search
search: true
search_full_content: true
search_provider: "lunr"
lunr:
  search_within_pages: false

# SEO Verification (optional)
google_site_verification:
bing_site_verification:
naver_site_verification:
yandex_site_verification:
baidu_site_verification:

# Social Sharing (optional)
twitter:
  username:
facebook:
  username:
  app_id:
  publisher:

