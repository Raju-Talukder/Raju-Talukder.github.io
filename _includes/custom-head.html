{% if page.url == "/" %}
  <!-- Force LinkedIn/OpenGraph image for homepage -->
  <meta property="og:image" content="{{ site.url }}/assets/images/og-card.png" />
  <meta property="og:image:secure_url" content="{{ site.url }}/assets/images/og-card.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="627" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="{{ site.url }}/assets/images/og-card.png" />
{% endif %}
