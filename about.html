<section class="github-repositories">
  <div class="container">
      <h2>My GitHub Repositories</h2>
      <ul id="repository-list">
          <!-- Repositories will be listed here dynamically -->
      </ul>
  </div>
</section>


<script>
  // Replace with your GitHub username
  const githubUsername = 'Raju-Talukder';

  // Fetch GitHub repositories using the GitHub API
  fetch(`https://api.github.com/users/${githubUsername}/repos`)
      .then(response => response.json())
      .then(repositories => {
          const repositoryList = document.getElementById('repository-list');

          repositories.forEach(repo => {
              const listItem = document.createElement('li');
              listItem.innerHTML = `<a href="${repo.html_url}" target="_blank">${repo.name}</a> - ${repo.description}`;
              repositoryList.appendChild(listItem);
          });
      })
      .catch(error => console.error(error));
</script>
