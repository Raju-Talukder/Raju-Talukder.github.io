<Style>
/* Add this CSS to your existing styles */

/* Repository List */
.repository-list {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  max-width: 100%;
}

/* Repository Card */
.repository-card {
  width: calc(16.6667% - 10px); /* 6 columns in a row with spacing */
  margin-bottom: 20px;
  background-color: #f8f9fa;
  border: 1px solid #ccc;
  border-radius: 5px;
  overflow: hidden;
}

/* Repository Image */
.repository-image {
  width: 100%;
  height: 100px; /* Fixed height for image */
  background-size: cover;
}

/* Repository Content */
.repository-content {
  padding: 15px;
}

/* Repository Title */
.repository-title {
  font-weight: bold;
  font-size: 18px;
  margin: 0;
  color: #333;
}

/* Repository Description */
.repository-description {
  color: #555;
  font-size: 14px;
  max-height: 80px; /* Max height for description */
  overflow: hidden;
  margin-top: 10px;
}

/* View on GitHub Button */
.repository-link {
  text-align: center;
  padding: 10px 0;
  background-color: #007bff;
}

.repository-link a {
  text-decoration: none;
  color: #fff;
  font-weight: bold;
  font-size: 14px;
}

/* On hover, change background color of "View on GitHub" button */
.repository-card:hover .repository-link {
  background-color: #0056b3;
}

</Style>

<section class="github-repositories">
  <div class="container">
      <h2 class="section-title">My GitHub Repositories</h2>
      <div class="repository-list row">
          <!-- Repositories will be listed here dynamically -->
      </div>
  </div>
</section>






<script>
  const githubUsername = 'Raju-Talukder';
  fetch(`https://api.github.com/users/${githubUsername}/repos?sort=updated`)
        .then(response => response.json())
        .then(repositories => {
            const repositoryList = document.querySelector('.repository-list');
            repositories.forEach(repo => {
                const repositoryCard = document.createElement('div');
                repositoryCard.classList.add('repository-card');
                repositoryCard.innerHTML = `
                    <div class="repository-name">${repo.name}</div>
                    <div class="repository-description">${repo.description || 'No description available.'}</div>
                    <div class="repository-link">
                        <a href="${repo.html_url}" target="_blank">View on GitHub</a>
                    </div>`;
                repositoryList.appendChild(repositoryCard);
            });
        })
        .catch(error => console.error(error));
</script>
