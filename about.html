<section class="github-repositories">
  <div class="container">
      <h2 class="section-title">My GitHub Repositories</h2>
      <div class="repository-list">
          <!-- Repositories will be listed here dynamically -->
      </div>
  </div>
</section>



<script>
  const githubUsername = 'Raju-Talukder';
  fetch(`https://api.github.com/users/${githubUsername}/repos`)
      .then(response => response.json())
      .then(repositories => {
          const repositoryList = document.querySelector('.repository-list')
          repositories.forEach(repo => {
              const listItem = document.createElement('li');
              listItem.innerHTML = `<a href="${repo.html_url}" target="_blank">${repo.name}</a>
                  <p class="repository-description">${repo.description || 'No description available.'}</p>`;
              repositoryList.appendChild(listItem);
          });
      })
      .catch(error => console.error(error));
</script>
