<Style>
/* Add this CSS to your existing styles */
.repository-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
}

.repository-list .repository-card {
    width: calc(16.6667% - 10px); /* 6 columns in a row with spacing */
    margin-bottom: 20px;
    background-color: #f8f9fa;
    border: 1px solid #ccc;
    border-radius: 5px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
}

.repository-list .repository-card .repository-image {
    width: 100%;
    height: 100px; /* Fixed height for image */
    background-size: cover;
}

.repository-list .repository-card .repository-content {
    flex-grow: 1;
    position: relative;
    padding: 10px;
}

.repository-list .repository-card .repository-title {
    font-weight: 600;
    font-size: 16px;
    margin: 0;
    color: #333;
}

.repository-list .repository-card .repository-description {
    color: #555;
    max-height: 2.5em; /* Set a maximum height for partial description */
    overflow: hidden;
    margin: 5px 0;
    font-size: 12px; /* Reduce font size */
}

.repository-list .repository-card .repository-link {
    text-align: center;
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 5px 0;
    background-color: #007bff;
}

.repository-list .repository-card .repository-link a {
    text-decoration: none;
    color: #fff;
    font-weight: 600;
}

/* On hover, change background color of "View on GitHub" button */
.repository-list .repository-card:hover .repository-link a {
    background-color: #0056b3;
}

</Style>

<section class="github-repositories">
  <div class="container">
      <h2 class="section-title">My GitHub Repositories</h2>
      <div class="repository-list row">
          <!-- Repositories will be listed here dynamically -->
      </div>
  </div>
</section>






<script>
  const githubUsername = 'Raju-Talukder';
  fetch(`https://api.github.com/users/${githubUsername}/repos?sort=updated`)
        .then(response => response.json())
        .then(repositories => {
            const repositoryList = document.querySelector('.repository-list');
            repositories.forEach(repo => {
                const repositoryCard = document.createElement('div');
                repositoryCard.classList.add('repository-card');
                repositoryCard.innerHTML = `
                    <div class="repository-name">${repo.name}</div>
                    <div class="repository-description">${repo.description || 'No description available.'}</div>
                    <div class="repository-link">
                        <a href="${repo.html_url}" target="_blank">View on GitHub</a>
                    </div>`;
                repositoryList.appendChild(repositoryCard);
            });
        })
        .catch(error => console.error(error));
</script>
